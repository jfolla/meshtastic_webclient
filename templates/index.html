<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meshtastic Web Chat</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #111827; color: #e5e7eb; }
    .wrap { max-width: 1220px; margin: 0 auto; padding: 16px; }
    .top { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
    .card { background: #1f2937; border: 1px solid #374151; border-radius: 12px; padding: 12px; }
    .status { font-size: 14px; color: #cbd5e1; }
    .layout { display: grid; grid-template-columns: 1fr 340px; gap: 16px; }
    .messages { height: 60vh; overflow-y: auto; padding: 12px; }
    .msg { padding: 8px 10px; border-radius: 10px; margin-bottom: 10px; white-space: pre-wrap; }
    .msg.in { background: #0f172a; }
    .msg.out { background: #1d4ed8; color: white; }
    .meta { font-size: 12px; opacity: .8; margin-bottom: 4px; }
    .controls { display: grid; grid-template-columns: 1fr 180px 120px; gap: 8px; margin-top: 12px; }
    input, button, select { border-radius: 10px; border: 1px solid #475569; padding: 10px 12px; background: #0f172a; color: #e5e7eb; }
    button { cursor: pointer; background: #2563eb; border-color: #2563eb; }
    button.secondary { background: #374151; border-color: #475569; }
    .side h3 { margin-top: 0; margin-bottom: 10px; }
    .side section + section { margin-top: 16px; }
    .node { padding: 8px; border-bottom: 1px solid #334155; cursor: pointer; }
    .node small { display: block; color: #94a3b8; }
    .hint { color: #94a3b8; font-size: 13px; margin-top: 8px; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 10px; }
    .stat .label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    .stat .value { font-size: 20px; font-weight: 700; }
    .stat .sub { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .controls { grid-template-columns: 1fr; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 520px) {
      .stat-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="card" style="flex:1 1 320px;">
        <div><strong>Meshtastic Web Chat</strong></div>
        <div id="status" class="status">Caricamento…</div>
      </div>
      <div class="card">
        <button class="secondary" id="refreshBtn">Aggiorna</button>
        <button class="secondary" id="clearBtn">Pulisci storico</button>
      </div>
    </div>

    <div class="layout">
      <div class="card">
        <div id="messages" class="messages"></div>
        <div class="controls">
          <input id="messageInput" type="text" placeholder="Scrivi un messaggio…">
          <input id="destInput" type="text" placeholder="Dest opzionale, es. !9ee783b4">
          <button id="sendBtn">Invia</button>
        </div>
        <div class="hint">Lascia il campo destinatario vuoto per inviare in broadcast sul canale corrente.</div>
      </div>

      <div class="card side">
        <section>
          <h3>Statistiche</h3>
          <div id="stats" class="stat-grid"></div>
          <div id="statsHint" class="hint"></div>
        </section>

        <section>
          <h3>Nodi</h3>
          <div id="nodes"></div>
        </section>
      </div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const nodesEl = document.getElementById('nodes');
    const statusEl = document.getElementById('status');
    const statsEl = document.getElementById('stats');
    const statsHintEl = document.getElementById('statsHint');
    const messageInput = document.getElementById('messageInput');
    const destInput = document.getElementById('destInput');
    let lastRender = '';

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function fmtValue(v) {
      return (v === null || v === undefined || v === '') ? 'n.d.' : String(v);
    }

    function statCard(label, value, sub = '') {
      return `
        <div class="stat">
          <div class="label">${escapeHtml(label)}</div>
          <div class="value mono">${escapeHtml(fmtValue(value))}</div>
          <div class="sub">${escapeHtml(sub)}</div>
        </div>`;
    }

    async function loadStatus() {
      const res = await fetch('/api/status');
      const data = await res.json();
      statusEl.textContent = `Backend ${data.mode} → ${data.target} · canale ${data.channel}`;
    }

    async function loadMessages() {
      const res = await fetch('/api/messages?limit=200');
      const data = await res.json();
      const rendered = data.map(msg => {
        const cls = msg.direction === 'out' ? 'out' : 'in';
        return `
          <div class="msg ${cls}">
            <div class="meta">${escapeHtml(msg.ts)} · ${escapeHtml(msg.from_id || '')} → ${escapeHtml(msg.to_id || '')}</div>
            <div>${escapeHtml(msg.text)}</div>
          </div>`;
      }).join('');

      if (rendered !== lastRender) {
        messagesEl.innerHTML = rendered;
        messagesEl.scrollTop = messagesEl.scrollHeight;
        lastRender = rendered;
      }
    }

    async function loadNodes() {
      const res = await fetch('/api/nodes');
      const data = await res.json();
      nodesEl.innerHTML = data.map(node => `
        <div class="node" data-id="${escapeHtml(node.node_id)}">
          <strong>${escapeHtml(node.name)}</strong>
          <small>${escapeHtml(node.node_id)} · ${escapeHtml(node.hw_model || '')}</small>
        </div>
      `).join('') || '<div class="hint">Nessun nodo noto</div>';

      document.querySelectorAll('.node').forEach(el => {
        el.addEventListener('click', () => {
          destInput.value = el.dataset.id;
          messageInput.focus();
        });
      });
    }

    async function loadStats() {
      const res = await fetch('/api/stats');
      const data = await res.json();
      const local = data.local || {};

      statsEl.innerHTML = [
        statCard('Backend connesso al nodo', data.health?.online ? 'SI' : 'NO', data.health?.detail || 'stato backend'),
        statCard('Ping backend', data.health?.probe_latency_ms, 'ms, controllo backend→nodo'),
        statCard('Ultimo pacchetto', data.health?.last_packet_at || 'n.d.', 'ultimo pacchetto visto dal backend'),
        statCard('Messaggi ricevuti', data.received_messages, 'testo ricevuto e salvato'),
        statCard('Messaggi inviati', data.sent_messages, 'testo inviato dalla web app'),
        statCard('Pacchetti ricevuti', data.received_packets, 'tutti i pacchetti visti dal backend'),
        statCard('Pacchetti ruotati visti', data.relayed_packets_seen, 'pacchetti con relay / multi-hop'),
        statCard('Multi-hop visti', data.multihop_packets_seen, 'hopStart > hopLimit'),
        statCard('Corrotti / rx bad', local.num_packets_rx_bad ?? data.bad_text_packets_seen, 'usa localStats se disponibili'),
        statCard('Ruotati inviati dal nodo', local.num_tx_relay, 'numTxRelay del nodo locale'),
        statCard('Persi / dropped', local.num_tx_dropped ?? data.send_failures, 'numTxDropped o errori invio web'),
        statCard('Nodi noti', local.num_total_nodes ?? data.known_nodes, 'totale visto dal backend'),
        statCard('Nodi online', local.num_online_nodes, 'da localStats del nodo'),
        statCard('Utilizzo canale', local.channel_utilization, 'telemetria locale'),
        statCard('Air util TX', local.air_util_tx, 'telemetria locale')
      ].join('');

      const started = data.started_at ? `backend avviato: ${data.started_at}` : 'backend avviato: n.d.';
      statsHintEl.textContent = `${started}. Il campo Backend connesso al nodo verifica che il backend riesca ancora a parlare col nodo. Ping backend non è un ping RF o ICMP.`;
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      const dest = destInput.value.trim();
      if (!text) return;

      const res = await fetch('/api/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, dest })
      });
      const data = await res.json();
      if (!data.ok) {
        alert(data.error || 'Errore invio');
        return;
      }
      messageInput.value = '';
      await loadMessages();
      await loadStats();
    }

    async function clearHistory() {
      await fetch('/api/clear', { method: 'POST' });
      await loadMessages();
      await loadStats();
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('refreshBtn').addEventListener('click', async () => {
      await loadStatus();
      await loadNodes();
      await loadMessages();
      await loadStats();
    });
    document.getElementById('clearBtn').addEventListener('click', clearHistory);
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    async function boot() {
      await loadStatus();
      await loadNodes();
      await loadMessages();
      await loadStats();
      setInterval(loadMessages, 2000);
      setInterval(loadNodes, 10000);
      setInterval(loadStats, 3000);
    }

    boot();
  </script>
</body>
</html>
