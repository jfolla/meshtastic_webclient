<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meshtastic Web Chat</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #111827; color: #e5e7eb; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }
    .top { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
    .card { background: #1f2937; border: 1px solid #374151; border-radius: 12px; padding: 12px; }
    .status { font-size: 14px; color: #cbd5e1; }
    .layout { display: grid; grid-template-columns: 1fr 280px; gap: 16px; }
    .messages { height: 60vh; overflow-y: auto; padding: 12px; }
    .msg { padding: 8px 10px; border-radius: 10px; margin-bottom: 10px; white-space: pre-wrap; }
    .msg.in { background: #0f172a; }
    .msg.out { background: #1d4ed8; color: white; }
    .meta { font-size: 12px; opacity: .8; margin-bottom: 4px; }
    .controls { display: grid; grid-template-columns: 1fr 180px 120px; gap: 8px; margin-top: 12px; }
    input, button { border-radius: 10px; border: 1px solid #475569; padding: 10px 12px; background: #0f172a; color: #e5e7eb; }
    button { cursor: pointer; background: #2563eb; border-color: #2563eb; }
    button.secondary { background: #374151; border-color: #475569; }
    .side h3 { margin-top: 0; }
    .node { padding: 8px; border-bottom: 1px solid #334155; cursor: pointer; }
    .node small { display: block; color: #94a3b8; }
    .hint { color: #94a3b8; font-size: 13px; margin-top: 8px; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .controls { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="card" style="flex:1 1 320px;">
        <div><strong>Meshtastic Web Chat</strong> · v{{ version }}</div>
        <div id="status" class="status">Loading…</div>
      </div>
      <div class="card">
        <button class="secondary" id="refreshBtn">Refresh</button>
        <button class="secondary" id="clearBtn">Clear history</button>
      </div>
    </div>
    <div class="layout">
      <div class="card">
        <div id="messages" class="messages"></div>
        <div class="controls">
          <input id="messageInput" type="text" placeholder="Type a message…">
          <input id="destInput" type="text" placeholder="Optional dest, e.g. !9ee783b4">
          <button id="sendBtn">Send</button>
        </div>
        <div class="hint">Leave destination empty to send a broadcast message on the current channel.</div>
      </div>
      <div class="card side">
        <h3>Nodes</h3>
        <div id="nodes"></div>
      </div>
    </div>
  </div>
  <script>
    const messagesEl = document.getElementById('messages');
    const nodesEl = document.getElementById('nodes');
    const statusEl = document.getElementById('status');
    const messageInput = document.getElementById('messageInput');
    const destInput = document.getElementById('destInput');

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    async function loadStatus() {
      const res = await fetch('/api/status');
      const data = await res.json();
      statusEl.textContent = `Backend ${data.mode} → ${data.target} · channel ${data.channel} · v${data.version}`;
    }

    async function loadMessages() {
      const res = await fetch('/api/messages?limit=200');
      const data = await res.json();
      const rendered = data.map(msg => `
          <div class="msg ${msg.direction === 'out' ? 'out' : 'in'}">
            <div class="meta">${escapeHtml(msg.ts)} · ${escapeHtml(msg.from_id || '')} → ${escapeHtml(msg.to_id || '')}</div>
            <div>${escapeHtml(msg.text)}</div>
          </div>
      `).join('');
      messagesEl.innerHTML = rendered || '<div class="hint">No messages yet.</div>';
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function loadNodes() {
      const res = await fetch('/api/nodes');
      const data = await res.json();
      nodesEl.innerHTML = data.map(node => `
        <div class="node" data-nodeid="${escapeHtml(node.node_id)}">
          <strong>${escapeHtml(node.name)}</strong>
          <small>${escapeHtml(node.node_id)}</small>
          <small>${escapeHtml(node.hw_model || '')}</small>
        </div>
      `).join('') || '<div class="hint">No known nodes.</div>';
      document.querySelectorAll('.node').forEach(el => {
        el.addEventListener('click', () => { destInput.value = el.dataset.nodeid || ''; });
      });
    }

    async function refreshAll() {
      try {
        await Promise.all([loadStatus(), loadMessages(), loadNodes()]);
      } catch (e) {
        statusEl.textContent = `Error: ${e}`;
      }
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      const dest = destInput.value.trim();
      if (!text) return;
      const res = await fetch('/api/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, dest })
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        alert(data.error || 'Send error');
        return;
      }
      messageInput.value = '';
      await refreshAll();
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
    document.getElementById('refreshBtn').addEventListener('click', refreshAll);
    document.getElementById('clearBtn').addEventListener('click', async () => {
      await fetch('/api/clear', { method: 'POST' });
      await refreshAll();
    });
    refreshAll();
    setInterval(refreshAll, 5000);
  </script>
</body>
</html>
