<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meshtastic Web Chat</title>
  <style>
    :root {
      --bg: #0f172a; --panel: #1e293b; --panel2: #111827; --text: #e5e7eb;
      --muted: #94a3b8; --accent: #4267e7; --border: #334155;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }
    .wrap { max-width: 1500px; margin: 0 auto; padding: 20px; }
    .topbar { display:grid; grid-template-columns: 1.3fr 2.2fr; gap:16px; margin-bottom: 16px; }
    .card { background: rgba(30,41,59,.9); border:1px solid var(--border); border-radius:16px; padding:16px; }
    .title { font-size: 20px; font-weight: 700; }
    .subtitle { color: var(--muted); margin-top: 6px; }
    .toolbar { display:flex; gap:10px; flex-wrap: wrap; align-items:center; }
    select,input,button { background: var(--panel2); color: var(--text); border:1px solid #475569; border-radius:12px; padding:10px 12px; font-size:15px; }
    button { cursor:pointer; background: #334155; }
    button.primary { background: var(--accent); border-color: var(--accent); }
    .layout { display:grid; grid-template-columns: 1fr 380px; gap:16px; }
    .messages { min-height: 560px; max-height: 68vh; overflow-y:auto; padding:8px; }
    .msg { padding: 10px 12px; border-radius: 12px; margin-bottom: 10px; background: #0b1222; }
    .msg.out { background: #2c4ee8; color: white; }
    .meta { font-size: 12px; opacity:.85; margin-bottom:4px; }
    .composer { display:grid; grid-template-columns: 1fr 220px 120px; gap:8px; margin-top:14px; }
    .hint { color: var(--muted); font-size: 13px; margin-top: 10px; }
    .side h3 { margin: 0 0 12px; font-size: 18px; }
    .stats { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    .stat { background:#0b1229; border:1px solid #22304a; border-radius:12px; padding:12px; min-height: 86px; }
    .stat-label { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
    .stat-value { font-size: 18px; font-weight: 700; word-break: break-word; }
    .nodes { margin-top: 16px; max-height: 260px; overflow-y:auto; border-top:1px solid var(--border); padding-top:12px; }
    .node { padding:8px 0; border-bottom:1px solid #27364f; cursor:pointer; }
    .node small { display:block; color: var(--muted); }
    @media (max-width: 1100px) {
      .topbar,.layout { grid-template-columns: 1fr; }
      .composer { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="card">
        <div class="title">Meshtastic Web Chat <span style="color:#94a3b8;font-size:16px;">v{{ version }}</span></div>
        <div id="statusLine" class="subtitle">Loading…</div>
      </div>
      <div class="card toolbar">
        <select id="langSelect">
          <option value="it">Italiano</option>
          <option value="en">English</option>
          <option value="fr">Français</option>
        </select>
        <button id="refreshBtn" data-i18n="refresh">Aggiorna</button>
        <button id="clearBtn" data-i18n="clearHistory">Pulisci storico</button>
        <button id="exportBtn" data-i18n="exportConfig">Esporta config</button>
        <input type="file" id="importFile">
        <button id="importBtn" data-i18n="importConfig">Importa config</button>
      </div>
    </div>

    <div class="layout">
      <div class="card">
        <div id="messages" class="messages"></div>
        <div class="composer">
          <input id="messageInput" type="text" data-i18n-placeholder="writeMessage" placeholder="Scrivi un messaggio...">
          <input id="destInput" type="text" data-i18n-placeholder="optionalDest" placeholder="Dest opzionale, es. !9ee783b4">
          <button id="sendBtn" class="primary" data-i18n="send">Invia</button>
        </div>
        <div class="hint" data-i18n="broadcastHint">Lascia vuoto il destinatario per inviare in broadcast sul canale corrente.</div>
      </div>

      <div class="card side">
        <h3 data-i18n="stats">Statistiche</h3>
        <div class="stats">
          <div class="stat"><div class="stat-label" data-i18n="backendConnected">Backend connesso al nodo</div><div id="statConnected" class="stat-value">—</div></div>
          <div class="stat"><div class="stat-label" data-i18n="lastPacket">Ultimo pacchetto</div><div id="statLastPacket" class="stat-value">—</div></div>
          <div class="stat"><div class="stat-label" data-i18n="messagesSaved">Messaggi salvati</div><div id="statMessagesSaved" class="stat-value">0</div></div>
          <div class="stat"><div class="stat-label" data-i18n="messagesReceived">Messaggi ricevuti</div><div id="statMessagesReceived" class="stat-value">0</div></div>
          <div class="stat"><div class="stat-label" data-i18n="messagesSent">Messaggi inviati</div><div id="statMessagesSent" class="stat-value">0</div></div>
          <div class="stat"><div class="stat-label" data-i18n="nodesKnown">Nodi noti</div><div id="statNodesKnown" class="stat-value">0</div></div>
        </div>

        <div class="nodes">
          <h3 data-i18n="nodes">Nodi</h3>
          <div id="nodes"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const I18N = {
      it: {
        refresh: "Aggiorna", clearHistory: "Pulisci storico", exportConfig: "Esporta config", importConfig: "Importa config",
        writeMessage: "Scrivi un messaggio...", optionalDest: "Dest opzionale, es. !9ee783b4", send: "Invia",
        broadcastHint: "Lascia vuoto il destinatario per inviare in broadcast sul canale corrente.",
        stats: "Statistiche", backendConnected: "Backend connesso al nodo", lastPacket: "Ultimo pacchetto",
        messagesSaved: "Messaggi salvati", messagesReceived: "Messaggi ricevuti", messagesSent: "Messaggi inviati",
        nodesKnown: "Nodi noti", nodes: "Nodi", noMessages: "Nessun messaggio", noNodes: "Nessun nodo noto",
        connected: "connesso", disconnected: "disconnesso", importSuccess: "Configurazione importata. Il backend proverà a riconnettersi.",
        importError: "Importazione configurazione fallita", sendError: "Errore invio"
      },
      en: {
        refresh: "Refresh", clearHistory: "Clear history", exportConfig: "Export config", importConfig: "Import config",
        writeMessage: "Write a message...", optionalDest: "Optional destination, e.g. !9ee783b4", send: "Send",
        broadcastHint: "Leave destination empty to broadcast on the current channel.",
        stats: "Statistics", backendConnected: "Backend connected to node", lastPacket: "Last packet",
        messagesSaved: "Saved messages", messagesReceived: "Messages received", messagesSent: "Messages sent",
        nodesKnown: "Known nodes", nodes: "Nodes", noMessages: "No messages", noNodes: "No known nodes",
        connected: "connected", disconnected: "disconnected", importSuccess: "Configuration imported. Backend will try to reconnect.",
        importError: "Configuration import failed", sendError: "Send error"
      },
      fr: {
        refresh: "Actualiser", clearHistory: "Effacer l'historique", exportConfig: "Exporter config", importConfig: "Importer config",
        writeMessage: "Écrire un message...", optionalDest: "Destination facultative, ex. !9ee783b4", send: "Envoyer",
        broadcastHint: "Laissez la destination vide pour diffuser sur le canal courant.",
        stats: "Statistiques", backendConnected: "Backend connecté au nœud", lastPacket: "Dernier paquet",
        messagesSaved: "Messages enregistrés", messagesReceived: "Messages reçus", messagesSent: "Messages envoyés",
        nodesKnown: "Nœuds connus", nodes: "Nœuds", noMessages: "Aucun message", noNodes: "Aucun nœud connu",
        connected: "connecté", disconnected: "déconnecté", importSuccess: "Configuration importée. Le backend va tenter de se reconnecter.",
        importError: "Échec de l'import de la configuration", sendError: "Erreur d'envoi"
      }
    };

    let currentLang = localStorage.getItem("meshtastic_lang") || (navigator.language || "en").slice(0,2);
    if (!I18N[currentLang]) currentLang = "en";
    document.getElementById("langSelect").value = currentLang;

    function t(key) { return (I18N[currentLang] && I18N[currentLang][key]) || I18N.en[key] || key; }
    function applyI18n() {
      document.querySelectorAll("[data-i18n]").forEach(el => el.textContent = t(el.dataset.i18n));
      document.querySelectorAll("[data-i18n-placeholder]").forEach(el => el.placeholder = t(el.dataset.i18nPlaceholder));
    }
    function escapeHtml(str) {
      return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }

    async function loadStatus() {
      const res = await fetch("/api/status");
      const data = await res.json();
      document.getElementById("statusLine").textContent = `${data.mode} → ${data.target} · ch ${data.channel}`;
      document.getElementById("statConnected").innerHTML = data.backend_connected
        ? `<span style="color:#bbf7d0;">SI</span><div style="font-size:13px;color:#94a3b8;">${escapeHtml(t("connected"))}</div>`
        : `<span style="color:#fecaca;">NO</span><div style="font-size:13px;color:#94a3b8;">${escapeHtml(t("disconnected"))}</div>`;
      document.getElementById("statLastPacket").textContent = data.last_packet_at || "—";
      document.getElementById("statMessagesSaved").textContent = data.messages_saved ?? 0;
      document.getElementById("statMessagesReceived").textContent = data.messages_received ?? 0;
      document.getElementById("statMessagesSent").textContent = data.messages_sent ?? 0;
      document.getElementById("statNodesKnown").textContent = data.nodes_known ?? 0;
    }

    async function loadMessages() {
      const res = await fetch("/api/messages?limit=200");
      const data = await res.json();
      const messagesEl = document.getElementById("messages");
      if (!data.length) {
        messagesEl.innerHTML = `<div style="color:#94a3b8;">${escapeHtml(t("noMessages"))}</div>`;
        return;
      }
      messagesEl.innerHTML = data.map(msg => {
        const cls = msg.direction === "out" ? "out" : "in";
        return `<div class="msg ${cls}">
          <div class="meta">${escapeHtml(msg.ts)} · ${escapeHtml(msg.from_id || "")} → ${escapeHtml(msg.to_id || "")}</div>
          <div>${escapeHtml(msg.text)}</div>
        </div>`;
      }).join("");
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function loadNodes() {
      const res = await fetch("/api/nodes");
      const data = await res.json();
      const nodesEl = document.getElementById("nodes");
      if (!data.length) {
        nodesEl.innerHTML = `<div style="color:#94a3b8;">${escapeHtml(t("noNodes"))}</div>`;
        return;
      }
      nodesEl.innerHTML = data.map(node => `
        <div class="node" data-id="${escapeHtml(node.node_id)}">
          <strong>${escapeHtml(node.name)}</strong>
          <small>${escapeHtml(node.node_id)} · ${escapeHtml(node.hw_model || "")}</small>
        </div>
      `).join("");
      document.querySelectorAll(".node").forEach(el => {
        el.addEventListener("click", () => {
          document.getElementById("destInput").value = el.dataset.id;
          document.getElementById("messageInput").focus();
        });
      });
    }

    async function sendMessage() {
      const text = document.getElementById("messageInput").value.trim();
      const dest = document.getElementById("destInput").value.trim();
      if (!text) return;
      const res = await fetch("/api/send", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text, dest})
      });
      const data = await res.json();
      if (!data.ok) { alert(data.error || t("sendError")); return; }
      document.getElementById("messageInput").value = "";
      loadMessages();
      loadStatus();
    }

    async function exportConfig() {
      const res = await fetch("/api/config");
      const data = await res.json();
      const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "app_config.json"; a.click();
      URL.revokeObjectURL(url);
    }

    async function importConfig() {
      const input = document.getElementById("importFile");
      if (!input.files.length) return;
      const text = await input.files[0].text();
      let payload;
      try { payload = JSON.parse(text); } catch (e) { alert(t("importError") + ": " + e); return; }
      const res = await fetch("/api/config", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!data.ok) { alert(data.error || t("importError")); return; }
      alert(t("importSuccess"));
      await loadStatus(); await loadNodes();
    }

    document.getElementById("sendBtn").addEventListener("click", sendMessage);
    document.getElementById("messageInput").addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });
    document.getElementById("refreshBtn").addEventListener("click", async () => { await loadStatus(); await loadNodes(); await loadMessages(); });
    document.getElementById("clearBtn").addEventListener("click", async () => { await fetch("/api/clear", {method:"POST"}); await loadMessages(); await loadStatus(); });
    document.getElementById("exportBtn").addEventListener("click", exportConfig);
    document.getElementById("importBtn").addEventListener("click", importConfig);
    document.getElementById("langSelect").addEventListener("change", (e) => {
      currentLang = e.target.value;
      localStorage.setItem("meshtastic_lang", currentLang);
      applyI18n(); loadMessages(); loadNodes(); loadStatus();
    });

    async function boot() {
      applyI18n();
      await loadStatus(); await loadNodes(); await loadMessages();
      setInterval(loadStatus, 5000);
      setInterval(loadNodes, 10000);
      setInterval(loadMessages, 2500);
    }
    boot();
  </script>
</body>
</html>
