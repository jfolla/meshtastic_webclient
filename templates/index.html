<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Meshtastic Web Chat</title>
  <style>
    :root { --bg:#0b1020; --card:#121a30; --muted:#9fb0d0; --text:#edf2ff; --accent:#4da3ff; --border:#243253; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--text); }
    .topbar { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid var(--border); position:sticky; top:0; background:rgba(11,16,32,.97); }
    .title { font-size:20px; font-weight:700; }
    .sub { color:var(--muted); font-size:12px; }
    .lang { display:flex; gap:8px; align-items:center; }
    select, button, input { background:#0e1730; color:var(--text); border:1px solid var(--border); border-radius:8px; padding:10px; }
    button { cursor:pointer; }
    .wrap { display:grid; grid-template-columns:1fr 320px; gap:16px; padding:16px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; }
    .messages { height:68vh; overflow:auto; display:flex; flex-direction:column; gap:10px; }
    .msg { border:1px solid var(--border); border-radius:10px; padding:10px; }
    .msg.out { border-color:#2f5f91; background:#10203c; }
    .meta { font-size:12px; color:var(--muted); margin-bottom:4px; }
    .composer { display:grid; grid-template-columns:1fr 160px 120px; gap:10px; margin-top:12px; }
    .sidebar { display:flex; flex-direction:column; gap:16px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .stat { background:#0e1730; border:1px solid var(--border); border-radius:10px; padding:10px; }
    .label { color:var(--muted); font-size:12px; }
    .value { font-weight:700; font-size:16px; margin-top:4px; }
    .status.ok { color:#63d471; }
    .status.bad { color:#ff8080; }
    ul { list-style:none; padding:0; margin:0; }
    li { padding:8px 0; border-bottom:1px solid rgba(255,255,255,.06); }
    @media (max-width: 980px){ .wrap{grid-template-columns:1fr;} .composer{grid-template-columns:1fr;} .messages{height:50vh;} }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <div class="title" data-i18n="title">Meshtastic Web Chat</div>
      <div class="sub">v{{ version }}</div>
    </div>
    <div class="lang">
      <label for="langSel" data-i18n="language">Language</label>
      <select id="langSel">
        <option value="it">Italiano</option>
        <option value="en">English</option>
      </select>
    </div>
  </div>
  <div class="wrap">
    <div class="card">
      <div class="messages" id="messages"></div>
      <div class="composer">
        <input id="msgText" placeholder="Type a message">
        <input id="msgDest" placeholder="Optional destination !nodeid">
        <button id="sendBtn" data-i18n="send">Send</button>
      </div>
    </div>
    <div class="sidebar">
      <div class="card">
        <div style="font-weight:700;margin-bottom:10px" data-i18n="connection">Connection</div>
        <div class="grid">
          <div class="stat"><div class="label" data-i18n="backend_connected">Backend connected to node</div><div class="value status" id="backendConnected">-</div></div>
          <div class="stat"><div class="label" data-i18n="detail">Detail</div><div class="value" id="connDetail">-</div></div>
          <div class="stat"><div class="label" data-i18n="last_packet">Last packet</div><div class="value" id="lastPacket">-</div></div>
          <div class="stat"><div class="label" data-i18n="last_error">Last error</div><div class="value" id="lastError">-</div></div>
        </div>
      </div>
      <div class="card">
        <div style="font-weight:700;margin-bottom:10px" data-i18n="statistics">Statistics</div>
        <div class="grid">
          <div class="stat"><div class="label" data-i18n="messages_rx">Messages received</div><div class="value" id="messagesRx">0</div></div>
          <div class="stat"><div class="label" data-i18n="messages_tx">Messages sent</div><div class="value" id="messagesTx">0</div></div>
          <div class="stat"><div class="label" data-i18n="packets_rx">Packets seen</div><div class="value" id="packetsRx">0</div></div>
          <div class="stat"><div class="label" data-i18n="relay_seen">Relayed seen</div><div class="value" id="relaySeen">0</div></div>
          <div class="stat"><div class="label" data-i18n="multi_hop">Multi-hop seen</div><div class="value" id="multiHop">0</div></div>
          <div class="stat"><div class="label" data-i18n="nodes_known">Known nodes</div><div class="value" id="nodesKnown">0</div></div>
          <div class="stat"><div class="label" data-i18n="online_nodes">Online nodes</div><div class="value" id="onlineNodes">-</div></div>
          <div class="stat"><div class="label" data-i18n="battery">Battery</div><div class="value" id="battery">-</div></div>
          <div class="stat"><div class="label" data-i18n="voltage">Voltage</div><div class="value" id="voltage">-</div></div>
          <div class="stat"><div class="label" data-i18n="channel_utilization">Channel util.</div><div class="value" id="channelUtil">-</div></div>
          <div class="stat"><div class="label" data-i18n="air_util_tx">Air util TX</div><div class="value" id="airUtilTx">-</div></div>
        </div>
      </div>
      <div class="card">
        <div style="font-weight:700;margin-bottom:10px" data-i18n="nodes">Nodes</div>
        <ul id="nodesList"></ul>
      </div>
    </div>
  </div>
<script>
const I18N = {
  it: {title:'Meshtastic Web Chat', language:'Lingua', send:'Invia', connection:'Connessione', backend_connected:'Backend connesso al nodo', detail:'Dettaglio', last_packet:'Ultimo pacchetto', last_error:'Ultimo errore', statistics:'Statistiche', messages_rx:'Messaggi ricevuti', messages_tx:'Messaggi inviati', packets_rx:'Pacchetti visti', relay_seen:'Relay visti', multi_hop:'Multi-hop visti', nodes_known:'Nodi noti', online_nodes:'Nodi online', battery:'Batteria', voltage:'Tensione', channel_utilization:'Utilizzo canale', air_util_tx:'Air util TX', nodes:'Nodi', yes:'SI', no:'NO', unknown:'sconosciuto', empty:'Nessun messaggio'},
  en: {title:'Meshtastic Web Chat', language:'Language', send:'Send', connection:'Connection', backend_connected:'Backend connected to node', detail:'Detail', last_packet:'Last packet', last_error:'Last error', statistics:'Statistics', messages_rx:'Messages received', messages_tx:'Messages sent', packets_rx:'Packets seen', relay_seen:'Relayed seen', multi_hop:'Multi-hop seen', nodes_known:'Known nodes', online_nodes:'Online nodes', battery:'Battery', voltage:'Voltage', channel_utilization:'Channel util.', air_util_tx:'Air util TX', nodes:'Nodes', yes:'YES', no:'NO', unknown:'unknown', empty:'No messages'}
};
let currentLang = localStorage.getItem('lang') || ((navigator.language||'en').startsWith('it') ? 'it':'en');
function t(k){ return (I18N[currentLang]||I18N.en)[k] || k; }
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
  document.getElementById('langSel').value=currentLang;
  document.getElementById('msgText').placeholder = currentLang==='it' ? 'Scrivi un messaggio' : 'Type a message';
  document.getElementById('msgDest').placeholder = currentLang==='it' ? 'Destinazione opzionale !nodeid' : 'Optional destination !nodeid';
}
document.getElementById('langSel').addEventListener('change', e=>{ currentLang=e.target.value; localStorage.setItem('lang', currentLang); applyI18n(); });
applyI18n();

function esc(s){ return (s ?? '').toString().replace(/[&<>\"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
async function api(path, opts={}){ const r = await fetch(path, opts); if(!r.ok) throw new Error(await r.text()); return await r.json(); }
function renderMessages(items){ const box=document.getElementById('messages'); box.innerHTML=''; if(!items.length){ box.innerHTML=`<div class="meta">${t('empty')}</div>`; return; } items.forEach(m=>{ const div=document.createElement('div'); div.className='msg '+(m.direction==='out'?'out':'in'); div.innerHTML=`<div class="meta">${esc(m.ts)} · ${esc(m.from_id||'')} → ${esc(m.to_id||'')}</div><div>${esc(m.text)}</div>`; box.appendChild(div); }); box.scrollTop=box.scrollHeight; }
function renderNodes(items){ const ul=document.getElementById('nodesList'); ul.innerHTML=''; items.forEach(n=>{ const li=document.createElement('li'); li.innerHTML=`<strong>${esc(n.name)}</strong><br><span class="sub">${esc(n.node_id)} ${esc(n.hw_model||'')}</span>`; ul.appendChild(li); }); }
function setValue(id, value){ document.getElementById(id).textContent = value ?? '-'; }
async function refresh(){
  try {
    const [messages, nodes, stats, health] = await Promise.all([api('/api/messages?limit=100'), api('/api/nodes'), api('/api/stats'), api('/api/health')]);
    renderMessages(messages); renderNodes(nodes);
    const conn = document.getElementById('backendConnected'); conn.textContent = health.backend_connected ? t('yes') : t('no'); conn.className='value status '+(health.backend_connected?'ok':'bad');
    setValue('connDetail', health.connection_detail || '-'); setValue('lastPacket', health.last_packet_at || '-'); setValue('lastError', health.last_error || '-');
    setValue('messagesRx', stats.messages_rx); setValue('messagesTx', stats.messages_tx); setValue('packetsRx', stats.packets_rx_seen); setValue('relaySeen', stats.relay_seen); setValue('multiHop', stats.multi_hop_seen);
    setValue('nodesKnown', stats.nodes_known); setValue('onlineNodes', stats.online_nodes); setValue('battery', stats.battery_level); setValue('voltage', stats.voltage);
    setValue('channelUtil', stats.channel_utilization); setValue('airUtilTx', stats.air_util_tx);
  } catch (e) { console.error(e); }
}
document.getElementById('sendBtn').addEventListener('click', async ()=>{ const text=document.getElementById('msgText').value.trim(); const dest=document.getElementById('msgDest').value.trim(); if(!text) return; try { await api('/api/send', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text, dest})}); document.getElementById('msgText').value=''; await refresh(); } catch(e){ alert(e); } });
setInterval(refresh, 4000); refresh();
</script>
</body>
</html>
